<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16171d"/>
      <stop offset="100%" stop-color="#1a1b24"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0085ff"/>
      <stop offset="100%" stop-color="#aa3bff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Cards -->
  <g transform="translate(420, 160)">
    <rect x="0" y="0" width="100" height="130" rx="12" fill="url(#card)" opacity="0.3" transform="rotate(-10 50 65)"/>
    <rect x="40" y="10" width="100" height="130" rx="12" fill="url(#card)" transform="rotate(5 90 75)"/>
    <path d="M58 76l16 16 28-32" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="600" fill="#f3f4f6">Bluesky Memo</text>
  <!-- Subtitle -->
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#9ca3af">Match replies to their original posts</text>
</svg>
